---
$schema: http://json-schema.org/draft-07/schema#
$id: nodl.schema.yaml
title: NoDL Node Definition
description: |
  NoDL (Node Definition Language) v2 schema.

  Describes the public ROS interface of a single ROS 2 node:
  parameters, publishers, subscriptions, service servers/clients,
  and action servers/clients. Field names align with ``rcl_interfaces``
  and ``rosgraph_msgs`` (``Topic``, ``Service``, ``Action``) so a NoDL document
  maps cleanly onto runtime introspection types.

  Node identity (name, package, namespace) is established by the
  enclosing package and the file's location within it, not declared
  inside the document.
type: object
additionalProperties: false
required:
  - nodl_version

properties:
  nodl_version:
    description: NoDL schema major version this document targets.
    const: 2

  description:
    type: string
    description: Human-readable description of what this node does.

  base:
    type: string
    enum: [node, lifecycle_node]
    description: Built-in ROS 2 base node type this node inherits from.

  fragments:
    type: array
    description: NoDL fragments composed into this node (single-level, not recursive).
    items:
      $ref: '#/definitions/fragment_ref'

  parameters:
    type: object
    description: |
      ROS parameters declared by this node, keyed by parameter name.
      Parameter shape is borrowed from ``generate_parameter_library``
      (see ``parameter.schema.yaml``).
    additionalProperties:
      $ref: parameter.schema.yaml#/definitions/parameter_definition

  publishers:
    type: array
    description: Topic publishers exposed by this node.
    items:
      $ref: '#/definitions/topic_endpoint'

  subscriptions:
    type: array
    description: Topic subscriptions consumed by this node.
    items:
      $ref: '#/definitions/topic_endpoint'

  service_servers:
    type: array
    description: Service servers exposed by this node.
    items:
      $ref: '#/definitions/service_endpoint'

  service_clients:
    type: array
    description: Service clients used by this node.
    items:
      $ref: '#/definitions/service_endpoint'

  action_servers:
    type: array
    description: Action servers exposed by this node.
    items:
      $ref: '#/definitions/action_endpoint'

  action_clients:
    type: array
    description: Action clients used by this node.
    items:
      $ref: '#/definitions/action_endpoint'

definitions:
  fragment_ref:
    type: object
    description: Reference to a NoDL fragment.
    required: [ref]
    additionalProperties: false
    properties:
      ref:
        type: string
        description: |
          'nodl://pkg/name' for ament-index fragments, or a relative file path.
      name:
        type: string
        description: Optional label for this fragment in documentation and merge order.

  rosName:
    type: string
    description: |
      Name of a ROS graph resource (Node, Topic, Service, Action).
      Accepts the standard name forms -- absolute (``/foo/bar``),
      relative (``foo/bar``), and private (``~/foo``). Must start with ``/``,
      ``~``, or a letter; may contain letters, digits, ``_``, ``/``; and must
      end with a letter, digit, or ``_`` (not a slash).
      See https://design.ros2.org/articles/topic_and_service_names.html
      for more information on names.
    pattern: ^[A-Za-z]$|^[/~A-Za-z][A-Za-z0-9_/]*[A-Za-z0-9_]$

  rosType:
    type: string
    description: |
      ROS interface type, format ``package/(msg|srv|action)?/TypeName``.
      Middle namespace is optional and may be determined by usage
      context (e.g. a publisher type implies ``msg``).
    pattern: ^[a-zA-Z][a-zA-Z0-9_]*(/(msg|srv|action))?/[A-Z][a-zA-Z0-9]*$
    examples:
      - std_msgs/msg/String
      - std_msgs/String
      - geometry_msgs/msg/Twist
      - std_srvs/srv/Trigger
      - lifecycle_msgs/srv/ChangeState
      - example_interfaces/action/Fibonacci
      - nav2_msgs/action/NavigateToPose

  qosProfile:
    type: object
    description: |
      QoS profile settings. Mirrors ``rcl_interfaces/QoSProfile`` field
      set and naming, but uses string enums in place of ``RMW`` integer
      codes for readability and signed-int nanoseconds in place of
      ``builtin_interfaces/Duration`` for ergonomics -- codegen converts
      the int to a ``Duration``. ``UNKNOWN`` values from the ``RMW`` spec are
      excluded; they are only meaningful for runtime observation.
    additionalProperties: false
    required:
      - history
      - reliability
    properties:
      history:
        description: History policy.
        enum: [KEEP_LAST, KEEP_ALL, SYSTEM_DEFAULT]
      depth:
        description: Queue depth. Required when ``history`` is ``KEEP_LAST``.
        type: integer
        minimum: 1
      reliability:
        description: Reliability policy.
        enum: [RELIABLE, BEST_EFFORT, SYSTEM_DEFAULT, BEST_AVAILABLE]
      durability:
        description: Durability policy.
        enum: [TRANSIENT_LOCAL, VOLATILE, SYSTEM_DEFAULT, BEST_AVAILABLE]
      deadline_ns:
        description: |
          Deadline between successive messages, in nanoseconds.
          Zero means no deadline is enforced. Stored as a signed
          64-bit integer (~292 years range).
        type: integer
        minimum: 0
      lifespan_ns:
        description: |
          Maximum age of a message before it is dropped, in
          nanoseconds. Zero means messages never expire.
        type: integer
        minimum: 0
      liveliness:
        description: Liveliness policy.
        enum: [AUTOMATIC, MANUAL_BY_TOPIC, SYSTEM_DEFAULT, BEST_AVAILABLE]
      liveliness_lease_duration_ns:
        description: |
          Maximum time between liveliness assertions before the
          publisher is considered not alive, in nanoseconds. Zero
          means the lease never expires.
        type: integer
        minimum: 0
    allOf:
      - if:
          properties:
            history:
              const: KEEP_LAST
          required:
            - history
        then:
          required:
            - depth

  topic_endpoint:
    type: object
    description: |
      Topic endpoint -- same shape for publishers and subscriptions;
      direction is implied by which top-level array contains it.
    additionalProperties: false
    required:
      - name
      - type
      - qos
    properties:
      name:
        $ref: '#/definitions/rosName'
        description: Topic name.
      type:
        $ref: '#/definitions/rosType'
      qos:
        $ref: '#/definitions/qosProfile'
      description:
        type: string

  service_endpoint:
    type: object
    description: |
      Service endpoint -- same shape for servers and clients;
      direction is implied by which top-level array contains it.
      A single qos profile applies; ``create_service`` accepts only one
      QoS input and applies it to both the request and response
      sides at runtime.
    additionalProperties: false
    required:
      - name
      - type
    properties:
      name:
        $ref: '#/definitions/rosName'
        description: Service name.
      type:
        $ref: '#/definitions/rosType'
      qos:
        $ref: '#/definitions/qosProfile'
      description:
        type: string

  action_endpoint:
    type: object
    description: |
      Action endpoint -- same shape for servers and clients;
      direction is implied by which top-level array contains it.
      The underlying decomposition into goal/result/cancel services
      and feedback/status topics (per ``rcl_interfaces/Action``) is not
      modelled here; it is an implementation concern.
    additionalProperties: false
    required:
      - name
      - type
    properties:
      name:
        $ref: '#/definitions/rosName'
        description: Action name.
      type:
        $ref: '#/definitions/rosType'
      description:
        type: string
