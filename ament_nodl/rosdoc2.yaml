type: 'rosdoc2 config'
version: 1

---
settings:
    # CMake-macro package: no Python modules and no C/C++ API to extract, so skip apidoc and doxygen.
    never_run_sphinx_apidoc: true
    generate_package_index: true

builders:
    - sphinx: {
        name: 'ament_nodl',
        sphinx_sourcedir: 'doc',
        output_dir: ''
    }
