---
name: Test

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build_and_test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - distro: humble
            image: rostooling/setup-ros-docker:ubuntu-jammy-ros-humble-ros-base-latest
          - distro: jazzy
            image: rostooling/setup-ros-docker:ubuntu-noble-ros-jazzy-ros-base-latest
          - distro: kilted
            image: rostooling/setup-ros-docker:ubuntu-noble-ros-kilted-ros-base-latest
          - distro: lyrical
            image: rostooling/setup-ros-docker:ubuntu-resolute-ros-lyrical-ros-base-latest
          - distro: rolling
            image: rostooling/setup-ros-docker:ubuntu-resolute-ros-rolling-ros-base-latest
    container:
      image: ${{ matrix.image }}
    steps:
      - uses: ros-tooling/action-ros-ci@v0.4
        with:
          package-name: nodl nodl_schema ros2nodl
          target-ros2-distro: ${{ matrix.distro }}
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: colcon-logs-${{ matrix.distro }}
          path: ros_ws/log
