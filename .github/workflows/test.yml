---
name: Test

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build_and_test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - ros: humble
            ubuntu: jammy
          - ros: jazzy
            ubuntu: noble
          - ros: kilted
            ubuntu: noble
          - ros: lyrical
            ubuntu: resolute
          - ros: rolling
            ubuntu: resolute
    container:
      image: rostooling/setup-ros-docker:ubuntu-${{ matrix.ubuntu }}-latest
    steps:
      - uses: ros-tooling/action-ros-ci@v0.4
        with:
          package-name: ament_nodl nodl nodl_observe nodl_schema ros2nodl test_ament_nodl
          target-ros2-distro: ${{ matrix.ros }}
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: colcon-logs-${{ matrix.ros }}
          path: ros_ws/log
