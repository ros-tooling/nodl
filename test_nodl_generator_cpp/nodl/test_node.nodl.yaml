nodl_version: 2
parameters:
  publish_rate:
    type: double
    default_value: 10.0
    description: Publish rate in Hz
  frame_id:
    type: string
    default_value: base_link
    description: Frame ID for published messages
  enabled:
    type: bool
    default_value: true
    read_only: true
publishers:
  - name: /output
    type: std_msgs/msg/String
    qos:
      history: KEEP_LAST
      depth: 10
      reliability: RELIABLE
subscriptions:
  - name: /input
    type: std_msgs/msg/String
    qos:
      history: KEEP_LAST
      depth: 5
      reliability: BEST_EFFORT
